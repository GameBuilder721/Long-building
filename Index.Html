<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Building Game</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            text-align: center;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #1a052e, #090214);
            margin: 0 auto;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            pointer-events: none;
        }
        #score {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .menu-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2ed573;
            width: 280px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }
        #gameOverScreen {
            display: none;
            border-color: #ff4757;
        }
        #badgeScreen {
            display: none;
            border-color: #54a0ff;
            max-height: 70vh;
            overflow-y: auto;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            margin: 8px;
            font-weight: bold;
        }
        .badge-btn {
            background-color: #54a0ff;
        }
        .close-btn {
            background-color: #ff4757;
        }
        .badge-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .badge-card {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }
        .badge-img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            background: #333;
            object-fit: cover;
        }
        .locked {
            filter: grayscale(100%) brightness(40%);
        }
        .badge-info h4 {
            margin: 0;
            color: #ffd32a;
        }
        .badge-info p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <button class="badge-btn" onclick="openBadges()">🏅 Badges Menu</button>
        
        <div id="gameOverScreen" class="menu-box">
            <h1 style="color: #ff4757; margin-top: 0;">GAME OVER</h1>
            <p>Your building collapsed!</p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <div id="badgeScreen" class="menu-box">
            <h2 style="color: #54a0ff; margin-top: 0;">Your Badges</h2>
            <div class="badge-container">
                
                <div class="badge-card">
                    <img id="img-master" class="badge-img locked" src="INSERT_MASTER_BADGE_URL_HERE" alt="Master Badge">
                    <div class="badge-info">
                        <h4 id="title-master">Locked</h4>
                        <p>Reach a score of 50</p>
                    </div>
                </div>

                <div class="badge-card">
                    <img id="img-grand" class="badge-img locked" src="INSERT_GRAND_MASTER_BADGE_URL_HERE" alt="Grand Master Badge">
                    <div class="badge-info">
                        <h4 id="title-grand">Locked</h4>
                        <p>Reach a score of 100</p>
                    </div>
                </div>

                <div class="badge-card">
                    <img id="img-secret" class="badge-img locked" src="INSERT_SECRET_BADGE_URL_HERE" alt="Secret Badge">
                    <div class="badge-info">
                        <h4 id="title-secret">Locked</h4>
                        <p>Reach a score of 1000</p>
                    </div>
                </div>

            </div>
            <button class="close-btn" onclick="closeBadges()">Close</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth > 400 ? 400 : window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let isGameOver = false;
    let inMenu = false;
    let speed = 2;
    const blockHeight = 40;
    let defaultWidth = 150;
    let blocks = [];
    let activeBlock = {};

    // Track Unlocked Badges (Saves in browser memory)
    let unlockedBadges = {
        master: localStorage.getItem("badge_master") === "true",
        grand: localStorage.getItem("badge_grand") === "true",
        secret: localStorage.getItem("badge_secret") === "true"
    };

    function init() {
        blocks = [{ x: (canvas.width - defaultWidth) / 2, y: canvas.height - blockHeight, w: defaultWidth }];
        spawnBlock();
        updateBadgeUI();
    }

    function spawnBlock() {
        let lastBlock = blocks[blocks.length - 1];
        activeBlock = { x: 0, y: lastBlock.y - blockHeight, w: lastBlock.w, direction: 1 };

        if (activeBlock.y < canvas.height / 2) {
            for (let b of blocks) b.y += blockHeight;
            activeBlock.y += blockHeight;
        }
    }

    function update() {
        if (isGameOver || inMenu) return;
        activeBlock.x += speed * activeBlock.direction;
        if (activeBlock.x + activeBlock.w > canvas.width || activeBlock.x < 0) {
            activeBlock.direction *= -1;
        }
    }
    const floorImg = new Image();
    floorImg.src = "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?q=80&w=400&auto=format&fit=crop";

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < blocks.length; i++) {
            if (floorImg.complete) {
                ctx.drawImage(floorImg, blocks[i].x, blocks[i].y, blocks[i].w, blockHeight);
            } else {
                ctx.fillStyle = "#888";
                ctx.fillRect(blocks[i].x, blocks[i].y, blocks[i].w, blockHeight);
            }
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(blocks[i].x, blocks[i].y, blocks[i].w, blockHeight);
        }
        
        if (!isGameOver && !inMenu) {
            if (floorImg.complete) {
                ctx.drawImage(floorImg, activeBlock.x, activeBlock.y, activeBlock.w, blockHeight);
            } else {
                ctx.fillStyle = "#fff";
                ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, blockHeight);
            }
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(activeBlock.x, activeBlock.y, activeBlock.w, blockHeight);
        }
    }

        if (!isGameOver && !inMenu) {
            ctx.fillStyle = "#fff";
            ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, blockHeight);
        }
    }

    window.addEventListener("pointerdown", (e) => {
        if (isGameOver || inMenu) return;
        if (e.target.tagName === "BUTTON") return;

        let lastBlock = blocks[blocks.length - 1];
        if (activeBlock.x + activeBlock.w <= lastBlock.x || activeBlock.x >= lastBlock.x + lastBlock.w) {
            isGameOver = true;
            document.getElementById("gameOverScreen").style.display = "block";
            return;
        }

        let newX = Math.max(activeBlock.x, lastBlock.x);
        let newWidth = Math.min(activeBlock.x + activeBlock.w, lastBlock.x + lastBlock.w) - newX;

        blocks.push({ x: newX, y: activeBlock.y, w: newWidth });
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        speed += 0.2;

        checkBadgeUnlocks();
        spawnBlock();
    });

    function checkBadgeUnlocks() {
        if (score >= 50 && !unlockedBadges.master) {
            unlockedBadges.master = true;
            localStorage.setItem("badge_master", "true");
        }
        if (score >= 100 && !unlockedBadges.grand) {
            unlockedBadges.grand = true;
            localStorage.setItem("badge_grand", "true");
        }
        if (score >= 1000 && !unlockedBadges.secret) {
            unlockedBadges.secret = true;
            localStorage.setItem("badge_secret", "true");
        }
        updateBadgeUI();
    }

    function updateBadgeUI() {
        if (unlockedBadges.master) {
            document.getElementById("img-master").classList.remove("locked");
            document.getElementById("title-master").innerText = "🏆 Master Builder";
        }
        if (unlockedBadges.grand) {
            document.getElementById("img-grand").classList.remove("locked");
            document.getElementById("title-grand").innerText = "👑 Grand Master";
        }
        if (unlockedBadges.secret) {
            document.getElementById("img-secret").classList.remove("locked");
            document.getElementById("title-secret").innerText = "🕵️ Secret Badge!";
        }
    }

    function openBadges() {
        inMenu = true;
        updateBadgeUI();
        document.getElementById("badgeScreen").style.display = "block";
    }

    function closeBadges() {
        inMenu = false;
        document.getElementById("badgeScreen").style.display = "none";
    }

    function resetGame() {
        score = 0; speed = 2; isGameOver = false;
        document.getElementById("score").innerText = "Score: 0";
        document.getElementById("gameOverScreen").style.display = "none";
        init();
    }

    function gameLoop() {
        update(); draw(); requestAnimationFrame(gameLoop);
    }

    init();
    gameLoop();
</script>
</body>
</html>
