<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Long Building</title>
    <meta name="description" content="Play Long Building - Swipe to stack the moving floors, look at your exclusive monk badges, and build the highest tower!">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e272e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            background: #70a1ff; 
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* HUD UI Overlay (Hidden during main menu) */
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            z-index: 5;
            display: none;
        }

        #scoreCounter {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
        }

        #timerDisplay {
            font-size: 1.2rem;
            margin-top: 5px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Bottom Menu System (Home, Badges & Start) */
        #menuContainer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(45, 52, 54, 0.95);
            border-top: 3px solid #74b9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 15;
            transition: transform 0.4s ease-out;
        }

        #menuContainer.hidden {
            transform: translateY(100%);
            pointer-events: none;
        }

        /* Content panels inside Menu */
        .menu-panel {
            width: 90%;
            color: white;
            text-align: center;
            min-height: 100px;
            display: none;
        }

        .menu-panel.active {
            display: block;
        }

        /* Start Button Rules */
        #startBtn {
            width: 200px;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #2ed573;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            transition: transform 0.1s;
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        /* Navigation Tabs (Home and Badges) */
        .nav-tabs {
            display: flex;
            width: 100%;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .tab-button {
            background: none;
            border: none;
            color: #b2bec3;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 20px;
            transition: color 0.2s;
        }

        .tab-button.active {
            color: #74b9ff;
            border-bottom: 2px solid #74b9ff;
        }

        /* Badge Grid */
        .badge-shelf {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .badge-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
        }

        .badge-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-bottom: 5px;
            background-size: cover;
            background-position: center;
        }

        /* Light Red Game Over Screen Overlay */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 92, 92, 0.9); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        #gameOverScreen.active {
            opacity: 1;
            pointer-events: auto;
        }

        #gameOverScreen h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
        }

        .btn-reset {
            width: 180px;
            padding: 12px;
            margin: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        #restartBtn { background-color: white; color: #ff5c5c; }
        #exitBtn { background-color: #2d3436; color: white; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- Main Score HUD -->
        <div id="ui">
            <div id="scoreCounter">0</div>
            <div id="timerDisplay">00:00</div>
        </div>

        <!-- Lower Screen Option Hub System -->
        <div id="menuContainer">
            <!-- Dynamic Panel Options -->
            <div id="homePanel" class="menu-panel active">
                <h3>Welcome to Long Building</h3>
                <p id="menuBestScore">Best Score = 0</p>
            </div>

            <div id="badgesPanel" class="menu-panel">
                <h3>Your Milestone Trophies</h3>
                <div class="badge-shelf">
                    <div class="badge-slot">
                        <div class="badge-circle" id="masterCircle"></div>
                        <span>Master</span>
                    </div>
                    <div class="badge-slot">
                        <div class="badge-circle" id="grandMasterCircle"></div>
                        <span>Grand Master</span>
                    </div>
                </div>
            </div>

            <!-- Bottom Trigger Layout Options -->
            <button id="startBtn">START</button>
            
            <div class="nav-tabs">
                <button class="tab-button active" id="homeTabBtn">Home</button>
                <button class="tab-button" id="badgesTabBtn">Badges</button>
            </div>
        </div>

        <!-- Lose Modal Layer -->
        <div id="gameOverScreen">
            <h1>Lose</h1>
            <p id="bestScore">Best Score = 0</p>
            <button class="btn-reset" id="restartBtn">Restart</button>
            <button class="btn-reset" id="exitBtn">Exit</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const scoreCounter = document.getElementById('scoreCounter');
        const timerDisplay = document.getElementById('timerDisplay');
        const menuContainer = document.getElementById('menuContainer');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const bestScoreText = document.getElementById('bestScore');
        const menuBestScore = document.getElementById('menuBestScore');

        // Panels and Tabs
        const homePanel = document.getElementById('homePanel');
        const badgesPanel = document.getElementById('badgesPanel');
        const homeTabBtn = document.getElementById('homeTabBtn');
        const badgesTabBtn = document.getElementById('badgesTabBtn');
        const startBtn = document.getElementById('startBtn');

        // Badge Nodes
        const masterCircle = document.getElementById('masterCircle');
        const grandMasterCircle = document.getElementById('grandMasterCircle');

        const MASTER_IMG_URL = "https://images.gspace.io/image_generation_content/2";
        const GRANDMASTER_IMG_URL = "https://images.gspace.io/image_generation_content/1";

        // Navigation Tab Logic Switching
        homeTabBtn.addEventListener('click', () => {
            homeTabBtn.classList.add('active');
            badgesTabBtn.classList.remove('active');
            homePanel.classList.add('active');
            badgesPanel.classList.remove('active');
        });

        badgesTabBtn.addEventListener('click', () => {
            badgesTabBtn.classList.add('active');
            homeTabBtn.classList.remove('active');
            badgesPanel.classList.add('active');
            homePanel.classList.remove('active');
        });

        startBtn.addEventListener('click', startGameMode);
        document.getElementById('restartBtn').addEventListener('click', resetToMenu);
        document.getElementById('exitBtn').addEventListener('click', () => alert("Thanks for playing!"));

        // Core Game Structural Rules
        const FLOOR_HEIGHT = 45;
        const GAP_SPACE = 25; // Clean physical spacing between moving floor and lower building
        let canvasWidth, canvasHeight;
        let floors = [];
        let score = 0;
        let highScore = localStorage.getItem('longBuildingHighScore') || 0;
        let gameActive = false;
        
        let startTime, timerInterval;
        let cameraY = 0; 
        let targetCameraY = 0;
        let grassY = 0; 

        let currentFloor = { x: 0, y: 0, width: 170, speed: 4, direction: 1 };

        // Swipe Handling Logic variables
        let touchStartX = 0;
        let isDragging = false;

        window.addEventListener('resize', resizeCanvas);
        setupControls();

        function resizeCanvas() {
            canvasWidth = canvas.parentElement.clientWidth;
            canvasHeight = canvas.parentElement.clientHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            grassY = canvasHeight - 45;
            menuBestScore.innerText = `Best Score = ${highScore}`;
            drawMenuState();
        }

        function setupControls() {
            // Screen Tap / Click to drop
            canvas.addEventListener('pointerdown', (e) => {
                if (!gameActive) return;
                touchStartX = e.clientX;
                isDragging = false;
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!gameActive) return;
                isDragging = true;
                // Move the floor horizontally based directly on your finger location
                let rect = canvas.getBoundingClientRect();
                let rootX = e.clientX - rect.left;
                currentFloor.x = rootX - (currentFloor.width / 2);
            });

            canvas.addEventListener('pointerup', (e) => {
                if (!gameActive) return;
                // If it was just a quick tap without drag, place it directly. Otherwise drop it on release!
                placeFloor();
            });
        }

        function drawMenuState() {
            ctx.fillStyle = '#70a1ff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // Draw initial static landscape base line
            ctx.fillStyle = '#2ed573'; 
            ctx.fillRect(0, grassY, canvasWidth, 60);

            // Base ground floor
            ctx.fillStyle = '#57606f';
            ctx.fillRect((canvasWidth - 170) / 2, canvasHeight - FLOOR_HEIGHT - 35, 170, FLOOR_HEIGHT - 2);
        }

        function startGameMode() {
            menuContainer.classList.add('hidden');
            ui.style.display = 'flex';
            
            floors = [];
            score = 0;
            cameraY = 0;
            targetCameraY = 0;
            grassY = canvasHeight - 45;
            gameActive = true;
            gameOverScreen.classList.remove('active');
            scoreCounter.innerText = score;

            // Base lower building structure setting
            floors.push({
                x: (canvasWidth - 170) / 2,
                y: canvasHeight - FLOOR_HEIGHT - 35, 
                width: 170,
                color: '#57606f'
            });

            spawnNextMovingFloor(170);

            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);

            // Load and update menu badges visually in the background
            evaluateBadges(highScore);

            animateLoop();
        }

        function updateTimer() {
            if (!gameActive) return;
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            let seconds = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${minutes}:${seconds}`;
        }

        function spawnNextMovingFloor(width) {
            let lastFloorY = floors[floors.length - 1].y;
            // Place moving target higher keeping a clean window gap space
            let targetY = lastFloorY - FLOOR_HEIGHT - GAP_SPACE;
            let dynamicSpeed = 3.5 + Math.min(score * 0.2, 10); 

            currentFloor = {
                x: Math.random() * (canvasWidth - width),
                y: targetY,
                width: width,
                speed: dynamicSpeed,
                direction: Math.random() > 0.5 ? 1 : -1,
                color: `hsl(${(score * 24) % 360}, 75%, 55%)`
            };
        }

        function placeFloor() {
            let lastFloor = floors[floors.length - 1];
            
            // Calculate boundaries over the lower tower
            let leftEdge = Math.max(currentFloor.x, lastFloor.x);
            let rightEdge = Math.min(currentFloor.x + currentFloor.width, lastFloor.x + lastFloor.width);
            let overlapWidth = rightEdge - leftEdge;

            if (overlapWidth <= 0) {
                endGameSession();
                return;
            }

            // Bring block down out of the gap space onto its final stack layer position
            currentFloor.x = leftEdge;
            currentFloor.width = overlapWidth;
            currentFloor.y = lastFloor.y - FLOOR_HEIGHT; 
            
            floors.push({...currentFloor});

            score++;
            scoreCounter.innerText = score;

            if (floors.length > 3) {
                targetCameraY += FLOOR_HEIGHT;
            }

            spawnNextMovingFloor(overlapWidth);
        }

        function evaluateBadges(targetScore) {
            if (targetScore >= 100) {
                masterCircle.style.backgroundImage = `url('${MASTER_IMG_URL}')`;
                masterCircle.style.borderColor = "#ffd700";
            } else {
                masterCircle.style.backgroundImage = 'none';
                masterCircle.style.borderColor = "#ffffff";
            }
            if (targetScore >= 1000) {
                grandMasterCircle.style.backgroundImage = `url('${GRANDMASTER_IMG_URL}')`;
                grandMasterCircle.style.borderColor = "#ffd700";
            } else {
                grandMasterCircle.style.backgroundImage = 'none';
                grandMasterCircle.style.borderColor = "#ffffff";
            }
        }

        function endGameSession() {
            gameActive = false;
            clearInterval(timerInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('longBuildingHighScore', highScore);
            }

            bestScoreText.innerText = `Best Score = ${highScore}`;
            evaluateBadges(highScore);
            gameOverScreen.classList.add('active');
        }

        function resetToMenu() {
            gameOverScreen.classList.remove('active');
            ui.style.display = 'none';
            menuContainer.classList.remove('hidden');
            menuBestScore.innerText = `Best Score = ${highScore}`;
            resizeCanvas();
        }

        function animateLoop() {
            if (!gameActive) return;

            // Camera movement values smoothly transition
            cameraY += (targetCameraY - cameraY) * 0.1;

            // Render background sky canvas details
            ctx.fillStyle = '#70a1ff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            ctx.save();
            ctx.translate(0, cameraY);

            // Draw landscape grass line - drops down and disappears out of frame
            ctx.fillStyle = '#2ed573'; 
            ctx.fillRect(0, grassY, canvasWidth, 120);

            // Draw lower building structural tower layers
            floors.forEach(floor => {
                ctx.fillStyle = floor.color;
                ctx.fillRect(floor.x, floor.y, floor.width, FLOOR_HEIGHT - 2);
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.strokeRect(floor.x, floor.y, floor.width, FLOOR_HEIGHT - 2);
            });

            // Move block horizontally automatically if player isn't dragging it explicitly
            if (!isDragging) {
                currentFloor.x += currentFloor.speed * currentFloor.direction;
                if (currentFloor.x + currentFloor.width >= canvasWidth) {
                    currentFloor.x = canvasWidth - currentFloor.width;
                    currentFloor.direction = -1;
                } else if (currentFloor.x <= 0) {
                    currentFloor.x = 0;
                    currentFloor.direction = 1;
                }
            }

            // Draw active layer moving floor item
            ctx.fillStyle = currentFloor.color;
            ctx.fillRect(currentFloor.x, currentFloor.y, currentFloor.width, FLOOR_HEIGHT - 2);

            ctx.restore();

            requestAnimationFrame(animateLoop);
        }

        resizeCanvas();
    </script>
</body>
</html>
