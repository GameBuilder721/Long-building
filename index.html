<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>LONG BUILDING</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { overflow:hidden; background:#6fcfff; font-family:Arial; }
        #game { position:fixed; width:100vw; height:100vh; overflow:hidden; }
        #world { position:absolute; bottom:0; width:100%; height:100%; z-index:1; }
        
        #menu { position:fixed; width:100%; height:100%; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(#69d1ff, #dff8ff); }
        
        button { border:4px solid #cc9900; border-radius:50px; background:#ffc400; font-weight:bold; cursor:pointer; pointer-events:auto; }
        #play { width:260px; height:80px; font-size:40px; margin-bottom:20px; }
        .nav-btn { font-size:24px; padding:10px 20px; }
        .menu-nav { display:flex; gap:30px; margin-top:20px; }
        
        #howToPlayPage, #badgePage { position:fixed; top:15%; left:10%; width:80%; padding:30px; background:#fff4d8; border:5px solid #ffc400; border-radius:30px; display:none; z-index:3000; font-size:28px; }
        #build { display:none; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:180px; height:60px; font-size:24px; z-index:2000; }
    </style>
</head>
<body>
    <div id="game">
        <div id="world"></div>
        <div id="menu">
            <h1 style="font-size:50px; color:white; margin-bottom:30px;">LONG BUILDING</h1>
            <button id="play">PLAY</button>
            <button id="howToPlayBtn" class="nav-btn">HOW TO PLAY</button>
            <div class="menu-nav">
                <button id="home" class="nav-btn">HOME</button>
                <button id="badges" class="nav-btn">BADGES</button>
            </div>
        </div>
        <div id="howToPlayPage">
            <div id="closeHow" style="text-align:right; cursor:pointer;">❌</div>
            <p>• Welcome to Long Building<br>• Click Play to start<br>• Click Build to stack floors</p>
        </div>
        <div id="badgePage">
            <div id="closeBadge" style="text-align:right; cursor:pointer;">❌</div>
            <div id="badgeList"></div>
        </div>
        <button id="build">BUILD</button>
    </div>
    <script>
    const menu = document.getElementById("menu");
    const play = document.getElementById("play");
    const build = document.getElementById("build");
    const world = document.getElementById("world");
    let score = 0;

    // Badges
    document.getElementById('badges').addEventListener('click', () => {
        const list = document.getElementById('badgeList');
        const b = [{f:100, n:"Rookie"}, {f:500, n:"Master"}, {f:1000, n:"Grand Master"}];
        list.innerHTML = "<h2>Achievements</h2>";
        b.forEach(i => {
            let status = score >= i.f ? '<span style="color:green;">✅</span>' : '';
            list.innerHTML += `<div style="margin:10px 0;">${i.f} floors = ${i.n} ${status}</div>`;
        });
        document.getElementById('badgePage').style.display = 'block';
    });

    document.getElementById('howToPlayBtn').onclick = () => document.getElementById('howToPlayPage').style.display = 'block';
    document.getElementById('closeHow').onclick = () => document.getElementById('howToPlayPage').style.display = 'none';
    document.getElementById('closeBadge').onclick = () => document.getElementById('badgePage').style.display = 'none';
    document.getElementById('home').onclick = () => location.reload();
    
    // Play button triggers game
    play.addEventListener('click', () => {
        menu.style.display = "none";
        build.style.display = "block";
        startGame(); // Calling your core game function
    });
        function startGame() {
        // CALL YOUR ORIGINAL FUNCTIONS HERE:
        // spawnFloor();
        // gameLoop();
        // drawGrass();
        // drawSideBuildings();
        console.log("Game graphics loading...");
    }

    // Ensure your original game-stacking logic functions 
    // are placed here to maintain your original game design.
    </script>
</body>
</html>
