<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>LONG BUILDING</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

overflow:hidden;

background:#6fcfff;

font-family:Arial;

}

#game{

position:fixed;

left:0;

top:0;

width:100vw;

height:100vh;

overflow:hidden;

background:linear-gradient(

#63cfff,

#8de0ff,

#c8f6ff,

#fff4d8

);

}

#world{

position:absolute;

left:0;

bottom:0;

width:100%;

height:90000px;

transform:translateY(0);

will-change:transform;

}

#grass{

position:absolute;

left:0;

bottom:0;

width:100%;

height:120px;

background:

linear-gradient(

#47d74f,

#2bbd2b

);

}

.grassBlade{

position:absolute;

bottom:100px;

width:5px;

height:25px;

background:#2ca52c;

border-radius:5px;

}

.cloud{

position:absolute;

background:white;

border-radius:100px;

opacity:.85;

}

.cloud:before{

content:"";

position:absolute;

width:60px;

height:60px;

background:white;

border-radius:50%;

left:20px;

top:-20px;

}

.cloud:after{

content:"";

position:absolute;

width:70px;

height:70px;

background:white;

border-radius:50%;

left:70px;

top:-30px;

}

.skyBuilding{

position:absolute;

bottom:120px;

background:#396f96;

border-top:8px solid #29597a;

}

.skyWindow{

position:absolute;

width:18px;

height:22px;

background:#ffe87a;

border:2px solid #dcb84d;

}

.floor{

position:absolute;

width:180px;

height:70px;

background:

linear-gradient(

#0b5376,

#0f6e92

);

border-top:8px solid #154d65;

border-bottom:8px solid #154d65;

box-shadow:

0 5px 15px rgba(0,0,0,.35);

}

.window{

position:absolute;

width:26px;

height:34px;

background:#ffe470;

border:4px solid #d7d7d7;

box-shadow:

inset 0 0 5px #fff;

}

.window:before{

content:"";

position:absolute;

left:9px;

top:0;

width:3px;

height:100%;

background:#b0b0b0;

}

.window:after{

content:"";

position:absolute;

left:0;

top:14px;

width:100%;

height:3px;

background:#b0b0b0;

}

#score{

position:fixed;

top:15px;

left:50%;

transform:translateX(-50%);

font-size:34px;

font-weight:bold;

color:white;

text-shadow:2px 2px 5px black;

z-index:100;

}

#menu{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:

linear-gradient(

#69d1ff,

#dff8ff

);

z-index:500;

}

#title{

margin-top:90px;

text-align:center;

font-size:50px;

font-weight:bold;

color:white;

text-shadow:3px 3px 6px black;

}

#play{

position:absolute;

bottom:110px;

left:50%;

transform:translateX(-50%);

width:220px;

height:70px;

border:none;

border-radius:50px;

background:#ffc400;

font-size:32px;

font-weight:bold;

}

#home{

position:absolute;

bottom:20px;

left:30px;

font-size:26px;

font-weight:bold;

}

#badges{

position:absolute;

bottom:20px;

right:30px;

font-size:26px;

font-weight:bold;

}

#build{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

width:210px;

height:70px;

background:

repeating-linear-gradient(

45deg,

#f8d500,

#f8d500 15px,

#222 15px,

#222 30px

);

border:none;

border-radius:15px;

font-size:30px;

font-weight:bold;

display:none;

z-index:1000;

}

.badgeCircle{

width:90px;

height:90px;

border-radius:50%;

background:black;

margin:25px auto;

}

</style>

</head>

<body>

<div id="game">

<div id="score">

0

</div>

<div id="world">

<div id="grass"></div>

</div>

<div id="menu">

<div id="title">

LONG BUILDING

</div>

<button id="play">

PLAY

</button>

<div id="home">

HOME

</div>

<div id="badges">

BADGES

</div>

</div>

<button id="build">

BUILD

</button>

<script>
    const world=
document.getElementById(
"world"
);

const play=
document.getElementById(
"play"
);

const build=
document.getElementById(
"build"
);

const menu=
document.getElementById(
"menu"
);

const scoreText=
document.getElementById(
"score"
);

let tower=[];

let movingFloor=null;

let moveX=90;

let moveDir=1;

let towerHeight=120;

let cameraY=0;

let score=0;

let playing=false;

for(
let i=0;
i<60;
i++
){

let g=
document.createElement(
"div"
);

g.className=
"grassBlade";

g.style.left=
Math.random()*400+
"px";

g.style.height=
20+
Math.random()*25+
"px";

world.appendChild(g);

}

for(
let i=0;
i<10;
i++
){

let c=
document.createElement(
"div"
);

c.className=
"cloud";

c.style.width=
120+
Math.random()*80+
"px";

c.style.height=
50+
Math.random()*20+
"px";

c.style.left=
Math.random()*400+
"px";

c.style.bottom=
500+
Math.random()*800+
"px";

world.appendChild(c);

}

function sideBuilding(
x,
w,
h
){

let b=
document.createElement(
"div"
);

b.className=
"skyBuilding";

b.style.left=
x+"px";

b.style.width=
w+"px";

b.style.height=
h+"px";

for(
let y=0;
y<8;
y++
){

for(
let x1=0;
x1<3;
x1++
){

let win=
document.createElement(
"div"
);

win.className=
"skyWindow";

win.style.left=
10+
x1*25+
"px";

win.style.top=
10+
y*30+
"px";

b.appendChild(
win
);

}

}

world.appendChild(
b
);

}

sideBuilding(
10,
80,
220
);

sideBuilding(
110,
90,
300
);

sideBuilding(
250,
80,
260
);

function makeFloor(
x,
y
){

let f=
document.createElement(
"div"
);

f.className=
"floor";

f.style.left=
x+"px";

f.style.bottom=
y+"px";

for(
let r=0;
r<2;
r++
){

for(
let c=0;
c<4;
c++
){

let w=
document.createElement(
"div"
);

w.className=
"window";

w.style.left=
10+
c*40+
"px";

w.style.top=
8+
r*28+
"px";

f.appendChild(
w
);

}

}

world.appendChild(
f
);

return f;

}

function createBase(){

let f=
makeFloor(
90,
90
);

tower.push({

x:90,

y:90,

obj:f

});

spawnFloor();

}

function spawnFloor(){

movingFloor=
makeFloor(

moveX,

towerHeight

);

}

play.onclick=
function(){

menu.style.display=
"none";

build.style.display=
"block";

playing=true;

createBase();

};

setInterval(
function(){

if(
!playing
)return;

if(
!movingFloor
)return;

moveX+=
moveDir*2;

if(
moveX<20
)
moveDir=1;

if(
moveX>160
)
moveDir=-1;

movingFloor.style.left=
moveX+
"px";

},
16
);
    function updateScore(){

scoreText.innerHTML=score;

if(score==50){
unlockBadge(
"Blue Key",
"bluekey.png"
);
}

if(score==100){
unlockBadge(
"Master",
"master.png"
);
}

if(score==1000){
unlockBadge(
"Grand Master",
"grandmaster.png"
);
}

}

function unlockBadge(
name,
img
){

let pop=
document.createElement(
"div"
);

pop.style.position=
"fixed";

pop.style.left="50%";
pop.style.top="50%";

pop.style.transform=
"translate(-50%,-50%)";

pop.style.background=
"rgba(0,0,0,.85)";

pop.style.padding=
"20px";

pop.style.borderRadius=
"20px";

pop.style.zIndex=
99999;

let image=
document.createElement(
"img"
);

image.src=img;

image.style.width=
"140px";

image.style.height=
"140px";

image.style.borderRadius=
"50%";

let text=
document.createElement(
"div"
);

text.innerHTML=
"<br><b>"+name+
"<br>UNLOCKED!</b>";

text.style.color=
"gold";

text.style.fontSize=
"24px";

text.style.textAlign=
"center";

pop.appendChild(
image
);

pop.appendChild(
text
);

document.body.appendChild(
pop
);

setTimeout(
function(){

pop.remove();

},
3000
);

}

build.onclick=
function(){

if(
!movingFloor
)return;

let last=
tower[
tower.length-1
];

let diff=
Math.abs(
moveX-last.x
);

if(
diff>60
){

movingFloor.style.transition=
"1s";

movingFloor.style.transform=
"rotate(25deg) translateY(500px)";

setTimeout(
function(){

alert(
"GAME OVER\n\nFLOORS : "+
score
);

location.reload();

},
1000
);

return;

}

movingFloor.style.left=
moveX+"px";

tower.push({

x:moveX,

y:towerHeight,

obj:movingFloor

});

score++;

updateScore();

movingFloor=null;

towerHeight+=70;

moveX=
tower[
tower.length-1
].x;

spawnFloor();

};

function cameraLoop(){

let target=
towerHeight-350;

if(
target<0
)
target=0;

cameraY+=
(target-cameraY)*0.08;

world.style.transform=
"translateY("+
cameraY+
"px)";

requestAnimationFrame(
cameraLoop
);

}

cameraLoop();

setInterval(
function(){

let clouds=
document.getElementsByClassName(
"cloud"
);

for(
let i=0;
i<clouds.length;
i++
){

let p=
parseFloat(
clouds[i].style.left
);

p+=0.4;

if(
p>420
)
p=-150;

clouds[i].style.left=
p+"px";

}

},
30
);
    document.getElementById(
"badges"
).onclick=function(){

alert(

"BADGES\n\n"+
"50 Floors = Blue Key\n\n"+
"100 Floors = Master\n\n"+
"1000 Floors = Grand Master"

);

};

document.getElementById(
"home"
).onclick=function(){

location.reload();

};

window.addEventListener(

"resize",

function(){

world.style.width=
window.innerWidth+
"px";

}

);

document.addEventListener(

"touchstart",

function(e){

if(
e.target.id=="build"
){

build.click();

}

}

);

function animateBuildings(){

let b=

document.getElementsByClassName(

"skyBuilding"

);

for(

let i=0;

i<b.length;

i++

){

let y=

Math.sin(

Date.now()/1000+i

)*0.5;

b[i].style.transform=

"translateY("+

y+

"px)";

}

requestAnimationFrame(

animateBuildings

);

}

animateBuildings();

function skyLoop(){

let c=

document.getElementsByClassName(

"cloud"

);

for(

let i=0;

i<c.length;

i++

){

let l=

parseFloat(

c[i].style.left

);

l+=0.2;

if(

l>500

){

l=-200;

}

c[i].style.left=

l+"px";

}

requestAnimationFrame(

skyLoop

);

}

skyLoop();

console.log(

"LONG BUILDING LOADED"

);

</script>

</body>

</html>
