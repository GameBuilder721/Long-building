<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Rush PRO</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; }
        #app { position: relative; width: 100vw; max-width: 450px; height: 100vh; background: #87CEEB; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; }
        #score { font-size: 3rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #badges { position: absolute; bottom: 120px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.3); border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.6rem; text-align: center; }
        #buildBtn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 220px; height: 75px; background: #f1c40f; border: none; border-radius: 20px; color: white; font-size: 28px; font-weight: bold; box-shadow: 0 8px #d35400; cursor: pointer; z-index: 10; }
        #buildBtn:active { transform: translateX(-50%) translateY(4px); box-shadow: 0 4px #d35400; }
    </style>
</head>
<body>

<div id="app">
    <canvas id="c"></canvas>
    <div id="ui"><div id="score">0</div></div>
    <div id="badges">
        <div class="slot" id="s1">SECRET</div>
        <div class="slot" id="s2">MASTER</div>
        <div class="slot" id="s3">GRAND</div>
    </div>
    <button id="buildBtn" onclick="game.build()">BUILD</button>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = 450; canvas.height = 800;

    class Game {
        constructor() {
            this.floors = [{x: 175, y: 650, width: 100}];
            this.active = {x: 0, y: 550, width: 100, speed: 5, dir: 1};
            this.score = 0;
            this.cameraY = 0;
            this.running = true;
        }

        draw() {
            ctx.clearRect(0,0,450,800);
            ctx.save();
            ctx.translate(0, this.cameraY);
            
            // Environment
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, -5000, 450, 6000);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, 740, 450, 60);
            ctx.fillStyle = "#34495e"; ctx.fillRect(30, 500, 70, 240); ctx.fillRect(320, 480, 80, 260);

            // Stacks
            ctx.fillStyle = "#d35400";
            this.floors.forEach(f => ctx.fillRect(f.x, f.y, f.width, 100));
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(this.active.x, this.active.y, 100, 100); // Width is fixed 100
            
            ctx.restore();
            
            if(this.running) {
                this.active.x += this.active.speed * this.active.dir;
                if(this.active.x > 350 || this.active.x < 0) this.active.dir *= -1;
                requestAnimationFrame(() => this.draw());
            }
        }

        build() {
            if(!this.running) return;
            let last = this.floors[this.floors.length-1];
            
            // Check if player is aligned within the 100px square
            let diff = Math.abs(this.active.x - last.x);
            
            if(diff < 30) { // Physics: You must be fairly aligned
                this.floors.push({x: last.x, y: this.active.y, width: 100}); // Fixed width 100
                this.active = {x: 0, y: this.active.y - 100, width: 100, speed: 5 + (this.score*0.2), dir: 1};
                this.score++;
                this.cameraY += 100;
                document.getElementById('score').innerText = this.score;
                this.updateBadges();
            } else {
                this.running = false;
                alert("Building Fell! Final Score: " + this.score);
                location.reload();
            }
        }

        updateBadges() {
            if(this.score >= 50) document.getElementById('s1').style.background = "gold";
            if(this.score >= 100) document.getElementById('s2').style.background = "silver";
            if(this.score >= 1000) document.getElementById('s3').style.background = "bronze";
        }
    }

    const game = new Game();
    game.draw();
</script>
</body>
</html>
