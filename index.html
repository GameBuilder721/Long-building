<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .badge-btn { pointer-events: auto; padding: 15px 25px; font-size: 18px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 10px; }
        #startScreen, #badgeScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        #badgeScreen { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="scoreDisplay" style="color: white; font-size: 24px; margin-bottom: 10px;">Score: 0</div>
        <button class="badge-btn" onclick="openBadges()">🏅 Badges Menu</button>
    </div>

    <div id="startScreen">
        <h1 style="color: #f1c40f;">Long Building</h1>
        <p>Stack blocks to reach 1000 floors!</p>
        <button class="badge-btn" onclick="startGame()">▶ PLAY GAME</button>
    </div>

    <div id="badgeScreen">
        <h1>Badges</h1>
        <p>50 Floors: Bronze | 100 Floors: Silver | 1000 Floors: Pro</p>
        <button class="badge-btn" onclick="closeBadges()">Close</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const floorImg = new Image();
        floorImg.src = "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?q=80&w=400&auto=format&fit=crop";

        let inMenu = true;
        let isGameOver = false;
        let blocks = [{x: canvas.width/2 - 50, y: canvas.height - 40, w: 100}];
        let activeBlock = {x: 0, y: 100, w: 100, dx: 5};
        let blockHeight = 20;
        let score = 0;

        function startGame() {
            inMenu = false;
            document.getElementById("startScreen").style.display = "none";
        }

        function openBadges() { document.getElementById("badgeScreen").style.display = "flex"; }
        function closeBadges() { document.getElementById("badgeScreen").style.display = "none"; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < blocks.length; i++) {
                if (floorImg.complete) ctx.drawImage(floorImg, blocks[i].x, blocks[i].y, blocks[i].w, blockHeight);
                else { ctx.fillStyle = "#888"; ctx.fillRect(blocks[i].x, blocks[i].y, blocks[i].w, blockHeight); }
            }
            if (!isGameOver && !inMenu) {
                activeBlock.x += activeBlock.dx;
                if (activeBlock.x + activeBlock.w > canvas.width || activeBlock.x < 0) activeBlock.dx *= -1;
                if (floorImg.complete) ctx.drawImage(floorImg, activeBlock.x, activeBlock.y, activeBlock.w, blockHeight);
                else { ctx.fillStyle = "#fff"; ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, blockHeight); }
            }
        }

        window.addEventListener('mousedown', () => {
            if (inMenu || isGameOver) return;
            blocks.push({x: activeBlock.x, y: activeBlock.y, w: activeBlock.w});
            activeBlock.y -= blockHeight;
            score++;
            document.getElementById("scoreDisplay").innerText = "Score: " + score;
        });

        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
