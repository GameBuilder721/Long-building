<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Long Building
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
#74d8ff,
#ffffff
);

font-family:
Arial;

overflow:hidden;

}

#menu{

position:fixed;

width:100%;

height:100%;

display:flex;

flex-direction:column;

align-items:center;

}

#title{

margin-top:60px;

font-size:38px;

font-weight:bold;

text-align:center;

color:white;

text-shadow:
3px 3px black;

padding:20px;

}

.small{

width:230px;

height:60px;

font-size:24px;

margin-top:20px;

background:gold;

border:none;

border-radius:30px;

}

#row{

display:flex;

gap:10px;

margin-top:20px;

}

.small2{

width:150px;

height:60px;

font-size:22px;

background:gold;

border:none;

border-radius:30px;

}

#playBtn{

position:fixed;

bottom:40px;

left:50%;

transform:
translateX(-50%);

width:260px;

height:90px;

font-size:40px;

background:gold;

border:none;

border-radius:45px;

}

</style>

</head>

<body>

<div id="menu">

<div id="title">

WELCOME TO THE
LONG BUILDING !

</div>

<button
class="small">

HOW TO PLAY

</button>

<div id="row">

<button
class="small2">

HOME

</button>

<button
class="small2">

BADGES

</button>

</div>

<button
id="playBtn">

▶ PLAY

</button>

</div>

</body>

</html>
