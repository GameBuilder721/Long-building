<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Long Building</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e272e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            background: linear-gradient(to bottom, #3ae374, #2d3436);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        #scoreCounter {
            font-size: 3rem;
            font-weight: bold;
            margin: 0;
        }

        #timerDisplay {
            font-size: 1.2rem;
            margin-top: 5px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
        }

        #badgeDisplay {
            font-size: 1rem;
            margin-top: 8px;
            font-weight: bold;
            color: #ffd700;
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 92, 92, 0.85); /* Light Red Screen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        #gameOverScreen.active {
            opacity: 1;
            pointer-events: auto;
        }

        #gameOverScreen h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        #gameOverScreen p {
            font-size: 1.5rem;
            margin: 5px 0;
            font-weight: 500;
        }

        .btn {
            width: 180px;
            padding: 14px;
            margin: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #restartBtn {
            background-color: #ffffff;
            color: #ff5c5c;
        }

        #exitBtn {
            background-color: #2d3436;
            color: white;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <!-- Canvas for rendering the tower -->
        <canvas id="gameCanvas"></canvas>

        <!-- Dynamic Game UI -->
        <div id="ui">
            <div id="scoreCounter">0</div>
            <div id="timerDisplay">00:00</div>
            <div id="badgeDisplay"></div>
        </div>

        <!-- Red Game Over Overlay -->
        <div id="gameOverScreen">
            <h1>Lose</h1>
            <p id="finalScore">Floors: 0</p>
            <p id="bestScore">Best Score: 0</p>
            <p id="endBadge" style="color: #ffd700; font-weight: bold; margin-bottom: 25px;"></p>
            <button class="btn" id="restartBtn">Restart</button>
            <button class="btn" id="exitBtn">Exit</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreCounter = document.getElementById('scoreCounter');
        const timerDisplay = document.getElementById('timerDisplay');
        const badgeDisplay = document.getElementById('badgeDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreText = document.getElementById('finalScore');
        const bestScoreText = document.getElementById('bestScore');
        const endBadgeText = document.getElementById('endBadge');
        
        // Buttons
        document.getElementById('restartBtn').addEventListener('click', initGame);
        document.getElementById('exitBtn').addEventListener('click', () => alert("Thanks for playing Long Building!"));
        canvas.addEventListener('click', placeFloor);
        window.addEventListener('resize', resizeCanvas);

        // Game Configuration & Variables
        const FLOOR_HEIGHT = 45;
        let canvasWidth, canvasHeight;
        let floors = [];
        let score = 0;
        let highScore = localStorage.getItem('longBuildingHighScore') || 0;
        let gameActive = false;
        
        // Timer Variables
        let startTime;
        let timerInterval;

        // Moving floor data
        let currentFloor = {
            x: 0,
            y: 0,
            width: 200,
            speed: 4,
            direction: 1
        };

        function resizeCanvas() {
            canvasWidth = canvas.parentElement.clientWidth;
            canvasHeight = canvas.parentElement.clientHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            if(!gameActive && floors.length === 0) {
                initGame();
            }
        }

        function initGame() {
            // Reset state
            floors = [];
            score = 0;
            gameActive = true;
            gameOverScreen.classList.remove('active');
            scoreCounter.innerText = score;
            badgeDisplay.innerText = "";
            
            // Set up base foundation floor
            floors.push({
                x: (canvasWidth - 160) / 2,
                y: canvasHeight - FLOOR_HEIGHT - 20,
                width: 160,
                color: '#2c3e50'
            });

            // Set up first sliding floor
            spawnNextFloor(160);

            // Timer Setup
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);

            animate();
        }

        function updateTimer() {
            if (!gameActive) return;
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            let seconds = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${minutes}:${seconds}`;
        }

        function spawnNextFloor(width) {
            let targetY = floors[floors.length - 1].y - FLOOR_HEIGHT;
            
            // Make the game gradually speed up slightly as score gets higher
            let currentSpeed = 3.5 + Math.min(score * 0.1, 8); 

            currentFloor = {
                x: 0,
                y: targetY,
                width: width,
                speed: currentSpeed,
                direction: 1,
                color: `hsl(${(score * 15) % 360}, 75%, 55%)` // Changes color dynamically per floor
            };
        }

        function placeFloor() {
            if (!gameActive) return;

            let lastFloor = floors[floors.length - 1];
            
            // Define overlap boundaries
            let leftEdge = Math.max(currentFloor.x, lastFloor.x);
            let rightEdge = Math.min(currentFloor.x + currentFloor.width, lastFloor.x + lastFloor.width);
            let overlapWidth = rightEdge - leftEdge;

            // LOSE CONDITION: Total Miss or no perfect/partial alignment
            if (overlapWidth <= 0) {
                endGame();
                return;
            }

            // Lock floor in place over the stack exactly where it dropped
            currentFloor.x = leftEdge;
            currentFloor.width = overlapWidth;
            floors.push({...currentFloor});

            score++;
            scoreCounter.innerText = score;
            
            // Check and update badges instantly
            checkBadges(score);

            // Shift view downwards if tower gets too high on the mobile screen
            if (floors.length > 5) {
                floors.forEach(f => f.y += FLOOR_HEIGHT);
            }

            // Spawn next floor matching the new cropped width
            spawnNextFloor(overlapWidth);
        }

        function checkBadges(currentScore) {
            let badge = "";
            if (currentScore >= 1000) {
                badge = "🏆 Grand Master";
                badgeDisplay.style.color = "#00efff";
            } else if (currentScore >= 100) {
                badge = "🥇 Master";
                badgeDisplay.style.color = "#ffd700";
            }
            badgeDisplay.innerText = badge;
            return badge;
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            
            // Handle highscore tracking
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('longBuildingHighScore', highScore);
            }

            // Update Game Over Display panel
            finalScoreText.innerText = `Floors: ${score}`;
            bestScoreText.innerText = `Best Score: ${highScore}`;
            
            let finalBadge = checkBadges(score);
            endBadgeText.innerText = finalBadge ? `Earned Badge: ${finalBadge}` : "";

            gameOverScreen.classList.add('active');
        }

        function animate() {
            if (!gameActive) return;

            // Clear Screen Frame
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Draw all permanent locked floors
            floors.forEach(floor => {
                ctx.fillStyle = floor.color;
                ctx.fillRect(floor.x, floor.y, floor.width, FLOOR_HEIGHT - 2); // Small gap lines looks like floor panels
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.strokeRect(floor.x, floor.y, floor.width, FLOOR_HEIGHT - 2);
            });

            // Move the active floating block floor horizontally
            currentFloor.x += currentFloor.speed * currentFloor.direction;

            // Bounce back off device layout borders
            if (currentFloor.x + currentFloor.width >= canvasWidth) {
                currentFloor.x = canvasWidth - currentFloor.width;
                currentFloor.direction = -1;
            } else if (currentFloor.x <= 0) {
                currentFloor.x = 0;
                currentFloor.direction = 1;
            }

            // Draw active block frame
            ctx.fillStyle = currentFloor.color;
            ctx.fillRect(currentFloor.x, currentFloor.y, currentFloor.width, FLOOR_HEIGHT - 2);

            requestAnimationFrame(animate);
        }

        // Setup Canvas environment layout on start execution
        resizeCanvas();
    </script>
</body>
</html>
