<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Long Building Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:#67d5ff;
}

#sky{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#67d5ff,#9ce8ff);
}

#score{
position:fixed;
top:20px;
width:100%;
text-align:center;
font-size:70px;
font-weight:bold;
color:white;
text-shadow:3px 3px black;
z-index:100;
}

#menu{
position:fixed;
top:110px;
width:100%;
text-align:center;
z-index:100;
}

  .small{
width:120px;
height:45px;
margin:5px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:15px;
background:yellow !important;
color:black;
}

#tower{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:160px;
}

.floor{
width:160px;
height:70px;
background:#0d4f7c;
border-top:4px solid #2da6d7;
border-bottom:4px solid #08324e;
margin-top:2px;
position:relative;
}

.window{
position:absolute;
width:22px;
height:30px;
background:#ffe96b;
top:18px;
}

#buildBtn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:180px;
height:80px;
font-size:32px;
font-weight:bold;
border:none;
border-radius:20px;
background:gold;
z-index:100;
}
#doubleBtn{
position:fixed;
bottom:115px;
right:20px;
width:80px;
height:50px;
font-size:24px;
background:red;
color:white;
border:none;
border-radius:15px;
z-index:100;
}

#timer{
position:fixed;
bottom:175px;
right:20px;
font-size:22px;
color:white;
font-weight:bold;
z-index:100;
  }
</style>

</head>

<body>

<div id="sky"></div>

<div id="score">
0
</div>

<div id="menu">

<button class="small" id="home">
HOME
</button>

<button class="small" id="badges">
BADGES
</button>

</div>

<div id="tower">
</div>

<button id="buildBtn">
BUILD
</button>
<button id="doubleBtn">2X</button>

<div id="timer">15:00</div>
<script>

let score=0;
let doubleMode=false;
let timeLeft=0;
let timerInterval;
let tower=document.getElementById("tower");
let scoreBox=document.getElementById("score");

function makeFloor(){

let floor=document.createElement("div");
floor.className="floor";

for(let i=0;i<4;i++){

let w=document.createElement("div");
w.className="window";
w.style.left=(15+i*35)+"px";

floor.appendChild(w);

}

tower.prepend(floor);

}

document.getElementById("buildBtn").onclick=function(){

let amount=doubleMode?2:1;

score+=amount;

scoreBox.innerHTML=score;

for(let i=0;i<amount;i++){
makeFloor();
}

};
document.getElementById("doubleBtn").onclick=function(){

if(doubleMode)return;

doubleMode=true;

timeLeft=900;

timerInterval=setInterval(function(){

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

if(s<10)s="0"+s;

document.getElementById("timer").innerHTML=m+":"+s;

if(timeLeft<=0){

clearInterval(timerInterval);

doubleMode=false;

document.getElementById("timer").innerHTML="15:00";

}

},1000);

}
makeFloor();
  </script>

</body>

</html>
