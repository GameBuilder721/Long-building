<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Long Building</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:linear-gradient(
#6bd5ff,
#b5f2ff
);
}

#score{

position:fixed;

top:20px;

width:100%;

text-align:center;

font-size:50px;

font-weight:bold;

color:white;

text-shadow:2px 2px black;

}

#menu{

position:fixed;

top:90px;

width:100%;

text-align:center;

}

.small{

width:120px;

height:45px;

background:gold;

border:none;

border-radius:15px;

font-size:20px;

font-weight:bold;

margin:5px;

}

#tower{

position:fixed;

bottom:120px;

left:50%;

transform:translateX(-50%);

width:160px;

}

.floor{

width:160px;

height:70px;

background:#0b4d78;

border-top:4px solid #30a8da;

border-bottom:4px solid #062942;

margin-top:2px;

position:relative;

}

.window{

position:absolute;

width:22px;

height:30px;

background:#ffe96b;

top:18px;

}

#buildBtn{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

width:180px;

height:70px;

background:gold;

border:none;

border-radius:20px;

font-size:30px;

font-weight:bold;

}

</style>

</head>

<body>

<div id="score">
0
</div>

<div id="menu">

<button
class="small"
id="home">
HOME
</button>

<button
class="small"
id="badges">
BADGES
</button>

</div>

<div id="tower">
</div>

<button id="buildBtn">
BUILD
</button>

<script>

let score=0;

let tower=
document.getElementById(
"tower"
);

let scoreBox=
document.getElementById(
"score"
);

function makeFloor(){

let floor=
document.createElement(
"div"
);

floor.className=
"floor";

for(
let i=0;
i<4;
i++
){

let w=
document.createElement(
"div"
);

w.className=
"window";

w.style.left=
(15+i*35)+"px";

floor.appendChild(
w
);

}

tower.prepend(
floor
);

}

document
.getElementById(
"buildBtn"
)
.onclick=function(){

score++;

scoreBox.innerHTML=
score;

makeFloor();

};

makeFloor();

</script>

</body>
</html>
