<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Rush Pro</title>
    <style>
        body { margin: 0; background: #5db6d2; overflow: hidden; display: flex; justify-content: center; height: 100vh; }
        #app { position: relative; width: 100vw; max-width: 450px; height: 100vh; background: linear-gradient(#5db6d2, #a1e2f7); }
        canvas { display: block; width: 100%; height: 100%; }
        /* Industrial Build Button */
        #buildContainer { position: absolute; bottom: 0; width: 100%; height: 110px; background: #333; display: flex; justify-content: center; align-items: center; border-top: 6px solid #222; }
        #buildBtn { width: 92%; height: 75px; background: #e5b02b; border: 4px solid #fff; border-radius: 8px; color: #fff; font-size: 30px; font-weight: 900; text-shadow: 2px 2px #000; cursor: pointer; letter-spacing: 2px; }
        #buildBtn:active { transform: translateY(4px); }
    </style>
</head>
<body>

<div id="app">
    <canvas id="c"></canvas>
    <div id="buildContainer">
        <button id="buildBtn" onclick="game.build()">BUILD</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = 450; canvas.height = 700;

    // Replace this with your high-res building sprite
    const buildingImg = new Image();
    buildingImg.src = 'https://i.imgur.com/YOUR_IMAGE_LINK.png'; 

    class Game {
        constructor() {
            this.floors = [{x: 125, y: 550}];
            this.active = {x: 0, y: 450, speed: 5, dir: 1};
            this.score = 0;
            this.cameraY = 0;
        }

        draw() {
            ctx.clearRect(0, 0, 450, 700);
            ctx.save();
            ctx.translate(0, this.cameraY);
            
            this.floors.forEach(f => ctx.drawImage(buildingImg, f.x, f.y, 200, 100));
            ctx.drawImage(buildingImg, this.active.x, this.active.y, 200, 100);
            
            ctx.restore();
            
            this.active.x += this.active.speed * this.active.dir;
            if(this.active.x > 250 || this.active.x < 0) this.active.dir *= -1;
            requestAnimationFrame(() => this.draw());
        }

        build() {
            let last = this.floors[this.floors.length-1];
            // LOOSER PHYSICS: 40% tolerance (80px overlap allowed)
            let diff = Math.abs(this.active.x - last.x);
            
            if(diff < 80) { 
                this.floors.push({x: this.active.x, y: this.active.y});
                this.active.y -= 100;
                this.cameraY += 100;
                this.score++;
            } else {
                alert("Building Destroyed! Score: " + this.score);
                location.reload();
            }
        }
    }

    const game = new Game();
    buildingImg.onload = () => game.draw();
</script>
</body>
</html>
