<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Rush PRO</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; }
        #app { position: relative; width: 100vw; max-width: 450px; height: 100vh; background: #87CEEB; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; }
        #score { font-size: 3rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #badgeAlert { position: absolute; top: 100px; width: 100%; text-align: center; font-size: 1.5rem; color: #ffd700; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #buildBtn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 220px; height: 75px; background: #f1c40f; border: none; border-radius: 15px; color: white; font-size: 28px; font-weight: bold; box-shadow: 0 8px #d35400; cursor: pointer; z-index: 10; }
        #buildBtn:active { transform: translateX(-50%) translateY(4px); box-shadow: 0 4px #d35400; }
    </style>
</head>
<body>

<div id="app">
    <canvas id="c"></canvas>
    <div id="ui"><div id="score">0</div></div>
    <div id="badgeAlert"></div>
    <button id="buildBtn" onclick="game.build()">BUILD</button>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = 450; canvas.height = 800;

    class Game {
        constructor() {
            this.floors = [{x: 175, y: 650}];
            this.active = {x: 0, y: 550, speed: 5, dir: 1};
            this.score = 0;
            this.cameraY = 0;
            this.running = true;
            this.badgesEarned = {50: false, 100: false, 1000: false};
        }

        drawBlock(x, y) {
            ctx.fillStyle = "#e0f7fa";
            ctx.fillRect(x, y, 100, 100);
            ctx.strokeStyle = "#81d4fa";
            ctx.lineWidth = 4;
            ctx.strokeRect(x + 2, y + 2, 96, 96);
            ctx.fillStyle = "#b3e5fc";
            for(let i=15; i<90; i+=30) {
                for(let j=15; j<90; j+=30) {
                    ctx.fillRect(x + i, y + j, 20, 20);
                }
            }
        }

        draw() {
            ctx.clearRect(0,0,450,800);
            ctx.save();
            ctx.translate(0, this.cameraY);
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, -5000, 450, 6000);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, 740, 450, 60);
            this.floors.forEach(f => this.drawBlock(f.x, f.y));
            this.drawBlock(this.active.x, this.active.y);
            ctx.restore();
            if(this.running) {
                this.active.x += this.active.speed * this.active.dir;
                if(this.active.x > 350 || this.active.x < 0) this.active.dir *= -1;
                requestAnimationFrame(() => this.draw());
            }
        }

        build() {
            if(!this.running) return;
            let last = this.floors[this.floors.length-1];
            if(Math.abs(this.active.x - last.x) < 25) {
                this.floors.push({x: last.x, y: this.active.y});
                this.active.y -= 100;
                this.score++;
                this.cameraY += 100;
                document.getElementById('score').innerText = this.score;
                this.checkBadges();
            } else {
                this.running = false;
                alert("Building Fell! Final Score: " + this.score);
                location.reload();
            }
        }

        checkBadges() {
            let alertEl = document.getElementById('badgeAlert');
            let levels = [1000, 100, 50];
            let names = ["GRAND MASTER", "MASTER", "SECRET"];
            
            for(let i=0; i<levels.length; i++) {
                if(this.score >= levels[i] && !this.badgesEarned[levels[i]]) {
                    this.badgesEarned[levels[i]] = true;
                    alertEl.innerText = "🏆 NEW BADGE: " + names[i];
                    alertEl.style.opacity = "1";
                    setTimeout(() => { alertEl.style.opacity = "0"; }, 3000);
                }
            }
        }
    }

    const game = new Game();
    game.draw();
</script>
</body>
</html>
