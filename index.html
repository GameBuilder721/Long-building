<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Long Building Arcade</title>
    <style>
        /* Professional UI - No text selection allowed */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        body { overflow:hidden; background:#6fcfff; font-family:Arial, sans-serif; }
        #game { position:fixed; width:100vw; height:100vh; overflow:hidden; }
        
        /* Buttons with yellow boundary */
        button { border:4px solid #cc9900 !important; border-radius:15px; font-weight:bold; cursor:pointer; z-index:10000; }
        #play, #build { width:200px; height:60px; background:#ffc400; font-size:24px; }
        
        #menu { position:fixed; width:100%; height:100%; background:linear-gradient(#69d1ff, #dff8ff); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
        #howToPlayPage { position:fixed; top:10%; left:10%; width:80%; height:80%; background:#fff4d8; border:5px solid #ffc400; border-radius:20px; display:none; z-index:2000; padding:30px; }
        #closeBtn { position:absolute; top:10px; right:10px; font-size:30px; cursor:pointer; color:red; }
    </style>
</head>
<body>
    <div id="game">
        <div id="menu">
            <h1>LONG BUILDING</h1>
            <button id="play">PLAY</button>
            <button id="howToPlayBtn">HOW TO PLAY</button>
        </div>
        <div id="howToPlayPage">
            <div id="closeBtn">❌</div>
            <h2>How to Play</h2>
            <p>• Welcome to Long Building<br>• Click Play to start<br>• Click Build to stack floors</p>
        </div>
        <button id="build" style="display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%);">BUILD</button>
    </div>
    <script>
    // CORE STATE
    let playing = false;
    const menu = document.getElementById("menu");
    const play = document.getElementById("play");
    const build = document.getElementById("build");
    const howToPlayBtn = document.getElementById("howToPlayBtn");
    const howToPlayPage = document.getElementById("howToPlayPage");
    const closeBtn = document.getElementById("closeBtn");

    // PROFESSIONAL EVENT LISTENERS (Stops dictionary pop-ups)
    play.addEventListener('touchstart', function(e) { e.preventDefault(); startGame(); }, {passive: false});
    play.addEventListener('click', function(e) { e.preventDefault(); startGame(); });

    howToPlayBtn.addEventListener('click', function(e) {
        e.preventDefault();
        howToPlayPage.style.display = "block";
    });

    closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        howToPlayPage.style.display = "none";
    });

    function startGame() {
        if(playing) return;
        playing = true;
        menu.style.display = "none";
        build.style.display = "block";
        // Call your original game initialization functions here
        console.log("Game started.");
    }
    </script>
