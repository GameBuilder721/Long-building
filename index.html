<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Long Building</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:#7fdcff;
}

#game{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(
#79d8ff,
#c8f5ff,
#ffffff
);
}

#world{
position:absolute;
left:0;
bottom:0;
width:100%;
height:60000px;
}

#grass{
position:absolute;
left:0;
bottom:0;
width:100%;
height:100px;
background:linear-gradient(
#4fd34f,
#2bb52b
);
}

.cloud{
position:absolute;
width:120px;
height:45px;
background:white;
border-radius:50px;
opacity:.85;
}

.cloud:before{
content:"";
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
left:20px;
top:-20px;
}

.cloud:after{
content:"";
position:absolute;
width:60px;
height:60px;
background:white;
border-radius:50%;
left:60px;
top:-25px;
}

#menu{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
z-index:100;
}

#title{
margin-top:70px;
text-align:center;
font-size:50px;
font-weight:bold;
color:white;
text-shadow:3px 3px black;
}

#how{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:180px;
height:50px;
font-size:22px;
}

#play{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:130px;
width:200px;
height:65px;
font-size:30px;
}

#home{
position:absolute;
bottom:30px;
left:30px;
font-size:26px;
font-weight:bold;
}

#badges{
position:absolute;
bottom:30px;
right:30px;
font-size:26px;
font-weight:bold;
}

#help{
display:none;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:85%;
background:#ffe56b;
padding:20px;
border-radius:20px;
border:4px solid black;
z-index:500;
}

#close{
position:absolute;
right:10px;
top:10px;
font-size:30px;
}

#helpText{
margin-top:35px;
font-size:22px;
line-height:40px;
}

#score{
display:none;
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:34px;
font-weight:bold;
color:white;
text-shadow:2px 2px black;
}

#build{
display:none;
position:fixed;
bottom:5px;
left:35%;
transform:translateX(-50%);
width:170px;
height:60px;
font-size:28px;
z-index:100;
}

#x2{
display:none;
position:fixed;
bottom:5px;
left:75%;
transform:translateX(-50%);
width:70px;
height:60px;
font-size:24px;
z-index:100;
}

.floor{
position:absolute;
width:180px;
height:65px;
background:#0d6f97;
border-top:8px solid #084d69;
border-bottom:8px solid #084d69;
}

.window{
position:absolute;
width:28px;
height:20px;
background:#ffe86d;
border:2px solid #999;
}

</style>

</head>

function makeFloor(
x,
y

let floor=
document.createElement(
"div"
);

floor.className=
"floor";

x+"px";

floor.style.bottom=

}

}

function createBase(){

let base=
makeFloor(
90,
100
);

tower.push({

x:90,

y:100,

obj:base

});

floorY=170;

spawnFloor();

}

function spawnFloor(){

movingFloor=
makeFloor(

moveX,

floorY

);

}

function(){

"none";

scoreBox.style.display=
"block";

build.style.display=
"block";

x2.style.display=
"block";

createBase();

};

setInterval(
function(){

if(
!playing

moveX+=

moveX<20

16

function(){

alert(
"2X MODE\nComing Soon"
);

};

    build.onclick=function(){

if(
!movingFloor
)return;

let last=
tower[
tower.length-1
];

let diff=
Math.abs(
moveX-last.x
);

if(
diff>60
){

movingFloor.style.transition=
"1s";

movingFloor.style.transform=
"rotate(25deg) translateY(500px)";

setTimeout(
function(){

alert(
"GAME OVER\n\nFLOORS : "+
score
);

location.reload();

},
1000
);

return;

}

movingFloor.style.left=
moveX+"px";

tower.push({

x:moveX,

y:floorY,

obj:movingFloor

});

score++;

scoreBox.innerHTML=
score;

movingFloor=null;

floorY+=70;

moveX=
tower[
tower.length-1
].x;

spawnFloor();

};

function cameraLoop(){

let target=
floorY-350;

if(
target<0
)
target=0;

cameraY+=
(target-cameraY)*0.08;

world.style.transform=
"translateY("+
cameraY+
"px)";

requestAnimationFrame(
cameraLoop
);

}

cameraLoop();

setInterval(
function(){

let clouds=
document.getElementsByClassName(
"cloud"
);

for(
let i=0;
i<clouds.length;
i++
){

let p=
parseFloat(
clouds[i].style.left
);

p+=0.3;

p>450

p=-150;

clouds[i].style.left=
p+"px";

}

30
);

if(
score==50

document.body.appendChild(

setInterval(
function(){

if(
blueBadge

document.getElementById(
"b1"
).innerHTML=

if(
masterBadge

document.getElementById(
"b2"
).innerHTML=

}

if(

"b3"
).innerHTML=

}

500

setInterval(
function(){

document.getElementsByClassName(

);

for(

i<c.length;
i++
){

let x=
parseFloat(
c[i].style.left
);

x+=0.2;

if(
x>500
){

x=-150;

}

c[i].style.left=
x+"px";

}

},
40
);
    document.getElementById(

function(){

x2.onclick=
function(){

if(

if(
!movingFloor
)return;

let last=
tower[
tower.length-1
];

let diff=

);

if(
diff>60
){

movingFloor.style.transition=

movingFloor.style.transform=

setTimeout(
function(){

alert(

score

location.reload();

},
1000
);

return;

}

movingFloor.style.left=

tower.push({

x:moveX,

y:floorY,

});

score++;

score++;

scoreBox.innerHTML=
score;

movingFloor=null;

floorY+=140;

moveX=
tower[
tower.length-1
].x;

spawnFloor();

};

setInterval(
function(){

let sky=
document.getElementsByClassName(
"cloud"
);

for(
let i=0;
i<sky.length;
i++
){

let y=
parseFloat(
sky[i].style.top
);

Math.sin(
Date.now()/1000+i
)*0.05;

sky[i].style.top=
y+"px";

}

},
50
);

window.addEventListener(
"resize",

world.style.width=
window.innerWidth+

);function animateSky(){

let clouds=
document.getElementsByClassName(
"cloud"
);

for(
let i=0;
i<clouds.length;
i++
){

let x=
parseFloat(
clouds[i].style.left
);

if(

){

x=0;

}

x+=0.25;

if(
x>500
){

}

}

);

}

animateSky();

function animateGrass(){

let grass=
document.querySelectorAll(
"#world div"
);

for(
let i=0;
i<grass.length;
i++
){

if(
grass[i].style.background==
"#239b23"
){

let r=
Math.sin(
Date.now()/300+i
);

grass[i].style.transform=
"rotate("+
r*2+
"deg)";

}

}

requestAnimationFrame(
animateGrass
);

}

animateGrass();

function updateTower(){

for(
let i=0;
i<tower.length;
i++
){

tower[i].obj.style.boxShadow=

"0px 3px 8px rgba(0,0,0,.3)";

}

requestAnimationFrame(
updateTower
);

}

updateTower();

setInterval(

function(){

if(
scoreBox
){

scoreBox.innerHTML=
score;

}

},

100

);

console.log(

"PART 7 LOADED"

);
    let gameOver=false;

function endGame(){

if(
gameOver
)return;

gameOver=true;

build.disabled=true;

x2.disabled=true;

setTimeout(
function(){

alert(
"Game Over!\n\nFloors Built: "+
score
);

location.reload();

},
1200
);

}

function shakeTower(){

for(
let i=0;
i<tower.length;
i++
){

tower[i].obj.style.transform=

"rotate("+

(Math.random()*2-1)+

"deg)";

}

setTimeout(
function(){

for(
let i=0;
i<tower.length;
i++
){

tower[i].obj.style.transform=
"rotate(0deg)";

}

},
150
);

}

function createFloatingText(
txt
){

let t=
document.createElement(
"div"
);

t.innerHTML=
txt;

t.style.position=
"fixed";

t.style.left=
"50%";

t.style.top=
"120px";

t.style.transform=
"translateX(-50%)";

t.style.color=
"yellow";

t.style.fontSize=
"30px";

t.style.fontWeight=
"bold";

t.style.zIndex=
"999";

document.body.appendChild(
t
);

setTimeout(
function(){

t.remove();

},
1000
);

}

function perfectPlacement(
diff
){

return diff<=8;

}

let oldBuild=
build.onclick;

build.onclick=
function(){

if(
gameOver
)return;

if(
!movingFloor
)return;

let last=
tower[
tower.length-1
];

let diff=
Math.abs(
moveX-last.x
);

if(
diff>60
){

shakeTower();

endGame();

return;

}

if(
perfectPlacement(diff)
){

createFloatingText(
"PERFECT!"
);

}

oldBuild();

};
